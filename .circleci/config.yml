version: 2.1

commands:
  install_node:
    steps:
      - run:
          name: Install Node 22.22.3
          command: |
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.8/install.sh | bash
            echo 'source $HOME/.nvm/nvm.sh' >> $BASH_ENV
            source $HOME/.nvm/nvm.sh
            nvm install 22.22.3
            nvm alias default 22.22.3
            node -v

# Define the jobs we want to run for this project
jobs:
  # The build job
  build:
    working_directory: ~/breakpirates-v3
    machine:
      image: ubuntu-2404:current
    steps:
      # Checkout the code from the branch into the working_directory
      - checkout
      # Log the current branch
      - run:
          name: Show current branch
          command: echo ${CIRCLE_BRANCH}
      # Restore local dependencies from cache
      - restore_cache:
          keys:
          - v1-deps-{{ checksum "package-lock.json" }}
          - v1-deps-
      - install_node
      # Install global dependencies
      - run:
          name: Install global dependencies
          command: npm install -g @angular/cli
      # Install project dependencies
      - run:
          name: Install local dependencies
          command: npm install
      # Cache local dependencies if they don't exist
      - save_cache:
          key: v1-deps-{{ checksum "package-lock.json" }}
          paths:
              - node_modules
      # Build app
      - run:
          name: Building for Production
          command: ng build
  # The test job
  test:
    working_directory: ~/breakpirates-v3
    machine:
      image: ubuntu-2404:current
    steps:
      # Checkout the code from the branch into the working_directory
      - checkout
      # Log the current branch
      - run:
          name: Show current branch
          command: echo ${CIRCLE_BRANCH}
      # Restore local dependencies from cache
      - restore_cache:
          keys:
          - v1-deps-{{ checksum "package-lock.json" }}
          - v1-deps-
      - install_node
      # Install global dependencies
      - run:
          name: Install global dependencies
          command: npm install -g @angular/cli
      # Install project dependencies
      - run:
          name: Install local dependencies
          command: npm install
      # Cache local dependencies if they don't exist
      - save_cache:
          key: v1-deps-{{ checksum "package-lock.json" }}
          paths:
              - node_modules
      # Test the source code
      - run:
          name: Testing via Jest
          command: npm run test
  # The lint job
  lint:
    working_directory: ~/breakpirates-v3
    machine:
      image: ubuntu-2404:current
    steps:
      # Checkout the code from the branch into the working_directory
      - checkout
      # Log the current branch
      - run:
          name: Show current branch
          command: echo ${CIRCLE_BRANCH}
      # Restore local dependencies from cache
      - restore_cache:
          keys:
          - v1-deps-{{ checksum "package-lock.json" }}
          - v1-deps-
      - install_node
      # Install global dependencies
      - run:
          name: Install global dependencies
          command: npm install -g @angular/cli
      # Install project dependencies
      - run:
          name: Install local dependencies
          command: npm install
      # Cache local dependencies if they don't exist
      - save_cache:
          key: v1-deps-{{ checksum "package-lock.json" }}
          paths:
              - node_modules
      # Lint the source code
      - run:
          name: Linting
          command: ng lint

# Orchestrate our job run sequence
workflows:
  build_and_test:
    jobs:
      - build
      - test:
          requires:
            - build
      - lint:
          requires:
            - build
